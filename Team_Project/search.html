<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탐색 - 사과 검색 결과</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        /* --- 1. 글로벌 리셋 & 공통 스타일 (기존 style.css 헤더 스타일 유지) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #1F1F1F; color: white; overflow-x: hidden; }
        ul { list-style: none; }

        /* 헤더 섹션 */
        .main-header {
            width: 100%; height: 162px; background: #7E7E7E;
            display: flex; align-items: center; padding: 0 40px; position: relative; z-index: 10;
        }
        .logo-container { width: 320px; height: 122px; position: relative; display: flex; align-items: center; cursor: pointer; }
        .hufs-logo { width: 122px; height: 122px; position: absolute; left: 0; top: 0; z-index: 1; object-fit: contain; }
        .brand-name {
            position: absolute; left: 73px; top: 7px; z-index: 2; color: #002843;
            font-size: 72px; font-weight: 900; line-height: 108px;
            -webkit-text-stroke: 5px #FFFFFF; paint-order: stroke fill; white-space: nowrap;
        }
        .search-container { flex: 1; display: flex; justify-content: center; margin: 0 40px; }
        .search-bar {
            width: 100%; max-width: 1105px; height: 99px; background: white;
            border: 2px solid #002843; display: flex; align-items: center; padding: 0 30px;
        }
        .search-bar input {
            width: 100%; border: none; outline: none; font-size: 36px;
            font-weight: 900; color: #767676; background: transparent;
        }
        .user-section { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .user-icon { width: 57px; height: 50px; opacity: 0.8; object-fit: contain; }
        .login-text { color: white; font-size: 30px; font-weight: 700; white-space: nowrap; }
        .header-accent-bar { width: 100%; height: 18px; background: #002843; border-bottom: 1.5px solid #B3B3B3; }

        /* --- 2. 탐색 페이지 전용 스타일 --- */
        .search-page-container {
            max-width: 1340px; margin: 0 auto; padding: 60px 0;
            min-height: calc(100vh - 180px);
        }

        /* 탐색 타이틀 & 검색 결과 안내 */
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 70px; font-weight: 900; margin-bottom: 10px; }
        .result-info { font-size: 30px; font-weight: 700; color: white; }

        /* 게시판 테이블 영역 */
        .board-wrapper {
            background: #212121; border: 1px solid #D9D9D9; padding: 40px;
        }
        .board-tabs { margin-bottom: 20px; }
        .tab-item {
            display: inline-block; padding: 10px 25px; border: 1px solid white;
            border-radius: 5px; font-size: 30px; font-weight: 700; background: #212121;
        }

        /* 결과 리스트 테이블 */
        .result-table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
        }
        .result-table thead th {
            color: #B4B4B4; font-size: 25px; font-weight: 700;
            padding: 15px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .result-table tbody td {
            padding: 20px 10px; font-size: 30px; font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .td-title { text-align: left !important; padding-left: 30px !important; cursor: pointer; }
        .td-title:hover { text-decoration: underline; }

        /* 하단 상세 검색창 */
        .bottom-search-section {
            display: flex; justify-content: flex-end; margin-top: 40px; gap: 0;
        }
        .filter-select {
            width: 130px; height: 37px; background: #DBDBDB;
            border: 2px solid #002843; font-size: 15px; font-weight: 900;
            color: #767676; padding: 0 10px; outline: none;
        }
        .bottom-input-box {
            width: 210px; height: 37px; background: white;
            border: 2px solid #002843; border-left: none;
            display: flex; align-items: center; padding: 0 10px;
        }
        .bottom-input-box input {
            width: 100%; border: none; outline: none; font-size: 15px;
            font-weight: 900; color: #767676;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-container" onclick="location.href='index.html'">
            <img src="image 1.png" alt="Logo" class="hufs-logo">
            <span class="brand-name">OOPS</span>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" value="사과">
            </div>
        </div>
        <div class="user-section">
            <img src="image-removebg-preview 1.png" alt="User" class="user-icon">
            <span class="login-text">로그인 / 회원가입</span>
        </div>
    </header>
    <div class="header-accent-bar"></div>

    <main class="search-page-container">
        <div class="page-header">
            <h1 class="page-title">탐색</h1>
            <p class="result-info">사과 검색 결과입니다..</p>
        </div>

        <section class="board-wrapper">
            <div class="board-tabs">
                <span class="tab-item">전체글</span>
            </div>

            <table class="result-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th style="width: 45%;">제목</th>
                        <th style="width: 15%;">글쓴이</th>
                        <th style="width: 15%;">등록일</th>
                        <th style="width: 8%;">조회수</th>
                        <th style="width: 7%;">추천</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2346</td>
                        <td class="td-title">사과의 효능 [1]</td>
                        <td>과일러버</td>
                        <td>2026.04.28</td>
                        <td>728</td>
                        <td>13</td>
                    </tr>
                    <tr>
                        <td>2237</td>
                        <td class="td-title">사과 관련 글1</td>
                        <td>사과</td>
                        <td>2026.04.28</td>
                        <td>728</td>
                        <td>13</td>
                    </tr>
                </tbody>
            </table>

            <div class="bottom-search-section">
                <select class="filter-select">
                    <option>전체▼</option>
                    <option>제목</option>
                    <option>글쓴이</option>
                </select>
                <div class="bottom-input-box">
                    <input type="text" placeholder="검색어를 입력해주세요.">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
