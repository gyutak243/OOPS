<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOPS - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        /* --- Reset & Global --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #212121;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header Section (문제 1 해결) --- */
        .main-header {
            width: 100%;
            height: 162px; /* 피그마 수치 복원 */
            background: #7E7E7E;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            /* 절묘한 일치를 위해 수치 정밀 조정 */
            width: 320px;
            height: 122px;
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .hufs-logo {
            width: 122px;
            height: 122px;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1;
            object-fit: contain;
        }

        .brand-name {
            /* 어긋남을 바로잡는 정밀 위치 */
            position: absolute;
            left: 73px; /* 피그마 정밀 수치 */
            top: 7px;   /* 피그마 정밀 수치 */
            z-index: 2;
            color: #002843;
            font-size: 72px; /* 폰트 크기 복원 */
            font-weight: 900;
            line-height: 108px;
            /* 디자인 시안의 흰색 외곽선 */
            -webkit-text-stroke: 5px #FFFFFF;
            paint-order: stroke fill;
            white-space: nowrap;
        }

        .header-accent-bar {
            width: 100%;
            height: 18px;
            background: #002843;
        }

        /* --- Login Container (문제 2 해결) --- */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px; /* 외부 여백을 넉넉히 주어 '직사각형' 느낌 강조 */
        }

        .login-box {
            /* 가로로 넓은 직사각형 비율 복원 */
            width: 1150px;
            height: 629px; /* 피그마 비율 적용 */
            background: #545454;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 132px 100px 80px; /* 상단 여백을 많이 주고 하단 여백 확보 */
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
        }

        .login-title {
            color: white;
            font-size: 72px; /* 디자인 시안 크기 복원 */
            font-weight: 900;
            line-height: 108px;
            margin-bottom: 46px; /* 입력창과의 정확한 간격 */
        }

        /* Input Fields */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 24px; /* 입력창 사이 정밀 간격 */
            width: 100%;
            max-width: 664px; /* 입력창 정밀 가로 너비 */
        }

        .input-field {
            width: 100%;
            height: 76px; /* 정밀 높이 */
            background: white;
            border: 2px solid #002843;
            padding: 0 33px;
            font-size: 36px; /* 폰트 크기 조정 */
            font-weight: 900;
            color: #767676;
            outline: none;
        }

        /* Login Options (하단 여백 및 정렬) */
        .login-footer {
            width: 100%;
            max-width: 664px;
            display: flex;
            justify-content: space-between;
            margin-top: 13px; /* 입력창과의 여백 복원 */
        }

        .footer-link {
            color: white;
            font-size: 25px; /* 디자인 시안 크기 복원 */
            font-weight: 900;
            line-height: 37.5px;
            text-decoration: none;
            cursor: pointer;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <header>
        <div class="main-header">
            <div class="logo-container">
                <img src="image 1.png" class="hufs-logo" alt="HUFS Logo">
                <div class="brand-name">OOPS</div>
            </div>
        </div>
        <div class="header-accent-bar"></div>
    </header>

    <main class="login-wrapper">
        <div class="login-box">
            <h1 class="login-title">OOPS 로그인</h1>
            
            <div class="input-group">
                <input type="text" class="input-field" placeholder="아이디">
                <input type="password" class="input-field" placeholder="비밀번호">
            </div>

            <div class="login-footer">
                <a class="footer-link">아이디/비밀번호 찾기</a>
                <a class="footer-link">회원 가입</a>
            </div>
        </div>
    </main>

</body>
</html>
