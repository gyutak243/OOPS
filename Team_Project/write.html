<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOPS - 글쓰기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        /* --- Global Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1F1F1F; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }

        /* --- Header --- */
        .main-header {
            width: 100%; height: 162px; background: #7E7E7E;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; position: relative;
        }
        .logo-container { width: 286px; height: 122px; display: flex; align-items: center; }
        .combined-logo-img { width: auto; height: 122px; object-fit: contain; }

        .top-search-container {
            width: 1105px; height: 99px; background: white;
            border: 2px solid #002843; display: flex; align-items: center; padding: 0 30px;
        }
        .top-search-input {
            width: 100%; border: none; outline: none;
            font-size: 36px; font-weight: 900; color: #000;
        }

        .user-section { display: flex; align-items: center; gap: 15px; min-width: 320px; justify-content: flex-end; }
        .user-icon { width: 57px; height: 50px; opacity: 0.6; }
        .login-text { font-size: 30px; font-weight: 700; color: white; }

        .header-accent-bar { width: 100%; height: 18px; background: #002843; }

        /* --- Main 레이아웃 --- */
        .content-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        
        .board-layout {
            width: 1338px; background: #212121;
            border: 1px solid #D9D9D9; padding: 50px 40px;
            min-height: 1000px;
        }

        .board-title { font-size: 70px; font-weight: 900; color: white; margin-bottom: 30px; }

        /* --- 글쓰기 폼 상단 --- */
        .write-header { 
            display: flex; align-items: center; gap: 20px; 
            border-bottom: 1px solid white; padding-bottom: 20px;
        }
        .label-title { font-size: 25px; font-weight: 700; color: white; width: 60px; }
        
        .title-input-container {
            width: 536px; height: 37px; background: white;
            border: 2px solid #002843; display: flex; align-items: center; padding: 0 15px;
        }
        .title-input { width: 100%; border: none; outline: none; font-size: 15px; font-weight: 900; }

        /* --- 2. 동적 카테고리 스타일 --- */
        .category-group { display: flex; gap: 25px; margin-left: auto; align-items: center; }
        .category-item { 
            font-size: 25px; font-weight: 700; color: #B4B4B4; 
            cursor: pointer; transition: all 0.2s; padding: 2px 15px;
        }
        /* 선택되었을 때의 스타일 */
        .category-item.active { 
            color: white; border: 1px solid white; border-radius: 5px; 
        }

        /* --- 1. 에디터 툴바 & 입력창 --- */
        .editor-container { width: 100%; margin-top: 20px; background: #F9F9F9; color: #333; border-radius: 4px; overflow: hidden; }
        
        .editor-toolbar { 
            background: #EEEEEE; padding: 10px; border-bottom: 1px solid #DDD;
            display: flex; gap: 15px; align-items: center;
        }
        .tool-btn { 
            font-weight: bold; cursor: pointer; color: #555; padding: 2px 8px; border-radius: 3px; 
        }
        .tool-btn:hover { background: #DDD; }
        .tool-sep { width: 1px; height: 20px; background: #CCC; }

        .editor-content {
            width: 100%; min-height: 500px; padding: 20px;
            background: #F2F2F2; border: none; outline: none;
            font-size: 18px; font-family: 'Inter'; resize: none;
        }

        /* 등록 버튼 */
        .footer-actions { display: flex; justify-content: flex-end; margin-top: 30px; }
        .submit-btn {
            width: 113px; height: 34px; background: white; border-radius: 10px;
            color: black; font-size: 25px; font-weight: 700; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-header">
            <div class="logo-container">
                <img src="상단 로고&검색어 박스.png" class="combined-logo-img" alt="OOPS LOGO">
            </div>
            <div class="top-search-container">
                <input type="text" class="top-search-input" placeholder="검색어를 입력해주세요.">
            </div>
            <div class="user-section">
                <img src="image-removebg-preview 1.png" class="user-icon">
                <span class="login-text">로그인 / 회원가입</span>
            </div>
        </div>
        <div class="header-accent-bar"></div>
    </header>

    <main class="content-wrapper">
        <div class="board-layout">
            <h1 class="board-title">통학 게시판</h1>

            <div class="write-header">
                <span class="label-title">제목</span>
                <div class="title-input-container">
                    <input type="text" class="title-input" placeholder="제목을 입력해주세요.">
                </div>

                <div class="category-group" id="categoryGroup">
                    <span class="category-item active" onclick="selectCategory(this)">일반</span>
                    <span class="category-item" onclick="selectCategory(this)">정보</span>
                    <span class="category-item" onclick="selectCategory(this)">셔틀</span>
                    <span class="category-item" onclick="selectCategory(this)">질문</span>
                </div>
            </div>

            <div class="editor-container">
                <div class="editor-toolbar">
                    <span class="tool-btn">B</span>
                    <span class="tool-btn"><em>I</em></span>
                    <span class="tool-btn"><u>U</u></span>
                    <div class="tool-sep"></div>
                    <span class="tool-btn">A▼</span>
                    <span class="tool-btn">🖼️ 사진</span>
                    <span class="tool-btn">🔗 링크</span>
                    <div class="tool-sep"></div>
                    <span class="tool-btn">≡</span>
                    <span class="tool-btn">📋 표</span>
                </div>
                <textarea class="editor-content" placeholder="본문을 입력해주세요."></textarea>
            </div>

            <div class="footer-actions">
                <button type="submit" class="submit-btn">등록하기</button>
            </div>
        </div>
    </main>

    <script>
        // 카테고리 클릭 시 디자인 변경 함수
        function selectCategory(element) {
            // 모든 카테고리 아이템에서 active 클래스 제거
            const items = document.querySelectorAll('.category-item');
            items.forEach(item => {
                item.classList.remove('active');
            });
            
            // 클릭한 아이템에만 active 클래스 추가 (테두리 생기고 진해짐)
            element.classList.add('active');
        }
    </script>

</body>
</html>
