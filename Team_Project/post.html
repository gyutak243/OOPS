<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통학 게시판 - 1150 버스 노선도</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        /* --- 1. 글로벌 리셋 & 공통 스타일 (기존 style.css 내용 포함) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: white; overflow-x: hidden; }
        ul { list-style: none; }

        /* 헤더 섹션 */
        .main-header {
            width: 100%; height: 162px; background: #7E7E7E;
            display: flex; align-items: center; padding: 0 40px; position: relative; z-index: 10;
        }
        .logo-container { width: 320px; height: 122px; position: relative; display: flex; align-items: center; cursor: pointer; }
        .hufs-logo { width: 122px; height: 122px; position: absolute; left: 0; top: 0; z-index: 1; object-fit: contain; }
        .brand-name {
            position: absolute; left: 73px; top: 7px; z-index: 2; color: #002843;
            font-size: 72px; font-weight: 900; line-height: 108px;
            -webkit-text-stroke: 5px #FFFFFF; paint-order: stroke fill; white-space: nowrap;
        }
        .search-container { flex: 1; display: flex; justify-content: center; margin: 0 40px; }
        .search-bar {
            width: 100%; max-width: 1105px; height: 99px; background: white;
            border: 2px solid #002843; display: flex; align-items: center; padding: 0 30px;
        }
        .search-bar input {
            width: 100%; border: none; outline: none; font-size: 36px;
            font-weight: 900; color: #767676; background: transparent;
        }
        .user-section { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .user-icon { width: 57px; height: 50px; opacity: 0.8; object-fit: contain; }
        .login-text { color: white; font-size: 30px; font-weight: 700; white-space: nowrap; }
        .header-accent-bar { width: 100%; height: 18px; background: #002843; border-bottom: 1.5px solid #B3B3B3; }

        /* --- 2. 게시글 상세 페이지 전용 스타일 --- */
        .post-detail-bg {
            width: 100%; min-height: calc(100vh - 180px);
            background: #1F1F1F; padding: 60px 0;
        }
        .container { max-width: 1340px; margin: 0 auto; }
        .board-title {
            color: white; font-size: 70px; font-weight: 900;
            margin-bottom: 40px; line-height: 105px;
        }
        .post-container {
            background: #212121; border: 1px solid #D9D9D9; padding: 40px;
        }

        /* 게시글 헤더 */
        .post-header { border-bottom: 1px solid white; padding-bottom: 20px; margin-bottom: 20px; }
        .title-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .category-tag {
            border: 1px solid white; padding: 5px 15px; border-radius: 5px;
            color: white; font-size: 25px; font-weight: 700;
        }
        .post-title { color: white; font-size: 25px; font-weight: 700; flex: 1; }
        .sub-btn {
            background: #5C5C5C; color: white; border: none; padding: 5px 20px;
            border-radius: 15px; font-size: 30px; font-weight: 700; cursor: pointer;
        }
        .meta-row { display: flex; justify-content: space-between; color: white; font-size: 15px; font-weight: 700; }
        .meta-left { display: flex; gap: 20px; }

        /* 본문 내용 */
        .post-content { padding: 50px 0; display: flex; justify-content: center; border-bottom: 1px solid white; }
        .content-img { max-width: 100%; height: auto; }

        /* 추천 버튼 */
        .vote-section { display: flex; justify-content: center; gap: 40px; padding: 80px 0; }
        .vote-btn {
            width: 149px; height: 103px; background: #4A4A4A; border-radius: 15px;
            border: none; display: flex; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer; transition: 0.2s;
        }
        .vote-btn:hover { background: #555; }
        .vote-btn .count { color: white; font-size: 25px; font-weight: 700; }
        .vote-btn img { width: 66px; height: 71px; object-fit: contain; }

        /* 댓글 영역 */
        .comment-section { margin-top: 40px; color: white; }
        .comment-count { font-size: 25px; font-weight: 700; margin-bottom: 30px; }
        .comment-list { margin-bottom: 50px; }
        .comment-item { background: #555555; margin-bottom: 2px; padding: 20px; border-radius: 5px; }
        .comment-item.reply { margin-left: 40px; }
        .comment-info { display: flex; justify-content: space-between; align-items: center; }
        .c-author { width: 160px; font-size: 20px; font-weight: 700; }
        .c-text { flex: 1; font-size: 20px; font-weight: 700; }
        .c-date { width: 160px; text-align: right; font-size: 20px; font-weight: 700; }

        /* 댓글 작성 폼 */
        .comment-form { background: #313131; border-radius: 5px; padding: 20px; position: relative; }
        .form-header { display: flex; gap: 20px; margin-bottom: 10px; color: white; font-size: 20px; font-weight: 700; }
        .form-body { display: flex; flex-direction: column; align-items: flex-end; }
        .form-body textarea {
            width: 100%; height: 100px; background: transparent; border: none;
            border-bottom: 1px solid #989898; color: white; font-size: 20px;
            resize: none; padding: 10px 0; margin-bottom: 15px; outline: none;
        }
        .form-body textarea::placeholder { color: #878787; }
        .submit-btn {
            background: white; color: black; border: none; padding: 10px 30px;
            border-radius: 10px; font-size: 25px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-container" onclick="location.href='index.html'">
            <img src="image 1.png" alt="Logo" class="hufs-logo">
            <span class="brand-name">OOPS</span>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="검색어를 입력해주세요.">
            </div>
        </div>
        <div class="user-section">
            <img src="image-removebg-preview 1.png" alt="User" class="user-icon">
            <span class="login-text">로그인 / 회원가입</span>
        </div>
    </header>
    <div class="header-accent-bar"></div>

    <main class="post-detail-bg">
        <div class="container">
            <h1 class="board-title">통학 게시판</h1>

            <article class="post-container">
                <header class="post-header">
                    <div class="title-row">
                        <span class="category-tag">일반</span>
                        <h2 class="post-title">1150 버스 노선도</h2>
                        <button class="sub-btn">구독</button>
                    </div>
                    <div class="meta-row">
                        <div class="meta-left">
                            <span class="author">통학러123</span>
                            <span class="date">2026.04.28 01:47</span>
                        </div>
                        <div class="meta-right">
                            추천 13 | 댓글 2 | 조회수 728
                        </div>
                    </div>
                </header>

                <section class="post-content">
                    <img src="image 4.png" alt="1150 버스 노선도" class="content-img">
                </section>

                <section class="vote-section">
                    <button class="vote-btn">
                        <span class="count">13</span>
                        <img src="image 5.png" alt="UP">
                    </button>
                    <button class="vote-btn">
                        <span class="count">0</span>
                        <img src="image 6.png" alt="DOWN">
                    </button>
                </section>

                <section class="comment-section">
                    <h3 class="comment-count">댓글 2개</h3>
                    <ul class="comment-list">
                        <li class="comment-item">
                            <div class="comment-info">
                                <span class="c-author">통학하는사람</span>
                                <p class="c-text">판교역 가나요?</p>
                                <span class="c-date">04.29 01:38</span>
                            </div>
                        </li>
                        <li class="comment-item reply">
                            <div class="comment-info">
                                <span class="c-author">통학러123</span>
                                <p class="c-text">ㄴ 네. 갑니다.</p>
                                <span class="c-date">04.29 01:42</span>
                            </div>
                        </li>
                    </ul>

                    <div class="comment-form">
                        <div class="form-header">
                            <span>댓글 작성</span>
                            <span>통학러123</span>
                        </div>
                        <div class="form-body">
                            <textarea placeholder="댓글을 입력해주세요"></textarea>
                            <button class="submit-btn">등록하기</button>
                        </div>
                    </div>
                </section>
            </article>
        </div>
    </main>
</body>
</html>
