<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 통학러123</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        /* --- 1. 글로벌 리셋 & 공통 스타일 (기존 style.css 헤더 스타일 유지) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #212121; color: white; overflow-x: hidden; }
        ul { list-style: none; }
        a { text-decoration: none; color: inherit; }

        /* 헤더 섹션 */
        .main-header {
            width: 100%; height: 162px; background: #7E7E7E;
            display: flex; align-items: center; padding: 0 40px; position: relative; z-index: 10;
        }
        .logo-container { width: 320px; height: 122px; position: relative; display: flex; align-items: center; cursor: pointer; }
        .hufs-logo { width: 122px; height: 122px; position: absolute; left: 0; top: 0; z-index: 1; object-fit: contain; }
        .brand-name {
            position: absolute; left: 73px; top: 7px; z-index: 2; color: #002843;
            font-size: 72px; font-weight: 900; line-height: 108px;
            -webkit-text-stroke: 5px #FFFFFF; paint-order: stroke fill; white-space: nowrap;
        }
        .search-container { flex: 1; display: flex; justify-content: center; margin: 0 40px; }
        .search-bar {
            width: 100%; max-width: 1105px; height: 99px; background: white;
            border: 2px solid #002843; display: flex; align-items: center; padding: 0 30px;
        }
        .search-bar input {
            width: 100%; border: none; outline: none; font-size: 36px;
            font-weight: 900; color: #767676; background: transparent;
        }
        .user-section { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .user-icon { width: 57px; height: 50px; opacity: 0.8; object-fit: contain; }
        .login-text { color: white; font-size: 30px; font-weight: 700; white-space: nowrap; }
        .header-accent-bar { width: 100%; height: 18px; background: #002843; border-bottom: 1.5px solid #B3B3B3; }

        /* --- 2. 마이페이지 전용 스타일 --- */
        .mypage-container {
            max-width: 1340px; margin: 0 auto;
            background: #212121; border-left: 1px solid #D9D9D9; border-right: 1px solid #D9D9D9;
            min-height: calc(100vh - 180px); padding: 40px 60px;
        }

        /* 프로필 상단 */
        .profile-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 50px; }
        .user-nickname { font-size: 70px; font-weight: 900; line-height: 105px; }
        .mypage-suffix { font-size: 25px; font-weight: 700; color: white; }

        /* 활동 내역 그래프 (image 7.png 영역) */
        .activity-graph-section { width: 100%; display: flex; justify-content: center; margin-bottom: 60px; }
        .activity-graph { width: 100%; max-width: 1183px; height: auto; border-radius: 10px; }

        /* 최근 활동 섹션 공통 */
        .activity-section { margin-bottom: 50px; }
        .section-label { font-size: 25px; font-weight: 700; margin-bottom: 25px; display: block; }

        /* 활동 아이템 (글/댓글 리스트) */
        .activity-list { display: flex; flex-direction: column; gap: 15px; }
        .activity-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .item-left { display: flex; align-items: center; gap: 20px; flex: 1; }
        .board-tag {
            border: 1px solid white; border-radius: 5px; padding: 2px 12px;
            font-size: 20px; font-weight: 700; white-space: nowrap;
        }
        .item-title { font-size: 30px; font-weight: 700; cursor: pointer; }
        .item-title:hover { text-decoration: underline; }
        .item-date { font-size: 30px; font-weight: 700; color: white; min-width: 180px; text-align: right; }

    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-container" onclick="location.href='index.html'">
            <img src="image 1.png" alt="Logo" class="hufs-logo">
            <span class="brand-name">OOPS</span>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="검색어를 입력해주세요.">
            </div>
        </div>
        <div class="user-section">
            <img src="image-removebg-preview 1.png" alt="User" class="user-icon">
            <span class="login-text">로그인 / 회원가입</span>
        </div>
    </header>
    <div class="header-accent-bar"></div>

    <main class="mypage-container">
        <div class="profile-header">
            <span class="user-nickname">통학러123</span>
            <span class="mypage-suffix">의 마이페이지</span>
        </div>

        <section class="activity-graph-section">
            <img src="image 7.png" alt="활동 내역 그래프" class="activity-graph">
        </section>

        <section class="activity-section">
            <span class="section-label">최근 작성 글</span>
            <div class="activity-list">
                <div class="activity-item">
                    <div class="item-left">
                        <span class="board-tag">통학 게시판</span>
                        <span class="item-title">1150번 빨버 시간표[2]</span>
                    </div>
                    <span class="item-date">2026.04.28</span>
                </div>
            </div>
        </section>

        <section class="activity-section">
            <span class="section-label">최근 작성 댓글</span>
            <div class="activity-list">
                <div class="activity-item">
                    <div class="item-left">
                        <span class="board-tag">통학 게시판</span>
                        <span class="item-title">네. 갑니다.</span>
                    </div>
                    <span class="item-date">2026.04.28</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
