<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOPS - 마이페이지</title>
    <link rel="stylesheet" href="my_Page.css">
</head>
<body>

    <div class="app-container">

        <header class="header">
            <div class="header__inner">
                <h1 class="header__logo">
                    <a href="#"><img src="public/main Logo.png" alt="LOOPS 로고"></a>
                </h1>
                <div class="header__search-bar">
                    <input type="text" placeholder="검색어를 입력해주세요.">
                </div>
                <nav class="header__nav">
                    <a href="#" class="header__link active">게시판</a>
                    <a href="#" class="header__link">학교 홈페이지</a>
                    <div class="header__auth-wrapper">
                        <button class="header__btn-login">
                            <img src="public/man.png" alt="프로필 아이콘" class="header__user-icon header__user-icon--bright">
                            마이페이지
                        </button>
                    </div>
                </nav>
            </div>
        </header>

        <div class="main-layout main-layout--center">
            
            <div class="board-header-row max-width-wrapper">
                <div class="board-header-row__left">
                    <h2 class="board-main-title">마이페이지 / 설정</h2>
                    <p class="search-summary">개인 프로필 및 계정 비밀번호 설정을 관리합니다.</p>
                </div>
            </div>

            <main class="content-area max-width-wrapper">
                <div class="settings-card">
                    
                    <section class="settings-group">
                        <h3 class="settings-group__title">프로필 설정</h3>
                        
                        <div class="profile-avatar-row">
                            <div class="avatar-holder">
                                <img src="public/man.png" alt="사용자 프로필">
                            </div>
                            <div class="avatar-actions">
                                <button type="button" class="btn-avatar-upload">이미지 변경</button>
                                <button type="button" class="btn-avatar-delete">삭제</button>
                            </div>
                        </div>

                        <div class="input-field-group">
                            <label class="input-label">닉네임 변경</label>
                            <div class="input-with-btn">
                                <input type="text" class="form-input" value="통학러123123" placeholder="변경할 닉네임을 입력하세요.">
                                <button type="button" class="btn-inline-action">중복 확인</button>
                            </div>
                        </div>

                        <div class="input-field-group">
                            <label class="input-label">상태 메세지 설정</label>
                            <input type="text" class="form-input" value="오늘도 무사히 통학 완료 🚌" placeholder="나의 상태 메세지를 입력해 보세요.">
                        </div>
                    </section>

                    <section class="settings-group">
                        <h3 class="settings-group__title">보안 설정</h3>
                        
                        <div class="input-field-group">
                            <label class="input-label">비밀번호 변경</label>
                            <div class="password-change-box">
                                <input type="password" class="form-input" placeholder="현재 비밀번호">
                                <input type="password" class="form-input" placeholder="새 비밀번호">
                                <input type="password" class="form-input" placeholder="새 비밀번호 확인">
                            </div>
                        </div>
                    </section>

                    <div class="settings-footer-row">
                        <a href="#" class="btn-delete-account">회원 탈퇴</a>
                        <div class="settings-footer-row__right">
                            <button type="button" class="btn-settings-cancel">취소</button>
                            <button type="submit" class="btn-settings-save">변경사항 저장</button>
                        </div>
                    </div>

                </div>
            </main>
        </div>

        <footer class="footer">
            <div class="footer__inner">
                <img src="public/under Logo.png" alt="LOOPS 하단 로고" class="footer__logo">
                <p class="footer__copyright">© 2026 OOPS. All right reserved.</p>
            </div>
        </footer>

    </div>

</body>
</html>
