<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOPS - 검색 결과 없음</title>
    <link rel="stylesheet" href="board_SearchEmpty.css">
</head>
<body>

    <div class="app-container">

        <header class="header">
            <div class="header__inner">
                <h1 class="header__logo">
                    <a href="#"><img src="public/main Logo.png" alt="LOOPS 로고"></a>
                </h1>
                
                <div class="header__search-bar">
                    <input type="text" placeholder="검색어를 입력해주세요." value="아무말">
                </div>

                <nav class="header__nav">
                    <a href="#" class="header__link active">게시판</a>
                    <a href="#" class="header__link">학교 홈페이지</a>
                    <div class="header__auth-wrapper">
                        <button class="header__btn-login">
                            <img src="public/man.png" alt="프로필 아이콘" class="header__user-icon header__user-icon--bright">
                            로그인 / 회원가입
                        </button>
                    </div>
                </nav>
            </div>
        </header>

        <div class="main-layout">
            
            <div class="board-header-row">
                <div class="board-header-row__left">
                    <h2 class="board-main-title">검색 결과</h2>
                    <p class="search-summary">'<span class="search-keyword">아무말</span>'에 대한 검색 결과가 총 <span class="search-count">0</span>건 있습니다.</p>
                </div>
            </div>

            <div class="board-content-wrapper">
                
                <aside class="sidebar">
                    <section class="sidebar-section">
                        <h3 class="sidebar-title">인기 실시간 게시글</h3>
                        <ul class="sidebar-list">
                            <li><a href="#">오늘 셔틀 버스 연착 정보... <span class="reply-badge">[1]</span></a></li>
                            <li><a href="#">수원 캠퍼스 셔틀...</a></li>
                            <li><a href="#">통학 시외권 정보... <span class="reply-badge">[5]</span></a></li>
                            <li><a href="#">통학 시간 단축...</a></li>
                            <li><a href="#">막차 시간 변경... <span class="reply-badge">[12]</span></a></li>
                            <li><a href="#">카풀 하실 분 구합... <span class="reply-badge">[1]</span></a></li>
                        </ul>
                    </section>
                </aside>

                <main class="content-area">
    <div class="board-empty-wrapper">
        <div class="empty-message-box">
            <img src="public/warning.png" alt="경고 아이콘" class="empty-message-box__icon" onerror="this.style.display='none';">
            <h3 class="empty-message-box__title">
                <span class="emphasis-tung">텅..</span><br>
                검색결과가 없습니다.
            </h3>
            <p class="empty-message-box__text">다른 검색어를 입력해보세요.</p>
        </div>
    </div>
</main>

            </div>
        </div>

        <footer class="footer">
            <div class="footer__inner">
                <img src="public/under Logo.png" alt="LOOPS 하단 로고" class="footer__logo">
                <p class="footer__copyright">© 2026 OOPS. All right reserved.</p>
            </div>
        </footer>

    </div>

</body>
</html>
