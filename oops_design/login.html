<!doctype html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/login-style.css" />
  </head>
  <body>
    <main class="login">
      <header class="name">
        <img class="element" src="img/oops.png" alt="Loops" />
      </header>
      <form action="#" method="post" aria-label="로그인 폼">
        <label class="div-wrapper" for="email">
          <span class="text-wrapper">이메일</span>
          <input
            id="email"
            name="email"
            type="email"
            placeholder=" "
            autocomplete="email"
            aria-label="이메일"
          />
        </label>
        <label class="div-wrapper" for="password">
          <span class="text-wrapper">비밀번호</span>
          <input
            id="password"
            name="password"
            type="password"
            placeholder=" "
            autocomplete="current-password"
            aria-label="비밀번호"
          />
        </label>
        <div class="find">
          <a class="div" href="#">비밀번호 찾기</a>
          <a class="div" href="#">회원 가입</a>
        </div>
        <button class="select" type="submit">
          <span class="text-wrapper-2">확인</span>
        </button>
      </form>
    </main>
  </body>
</html>
