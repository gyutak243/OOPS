<!doctype html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>회원가입</title>
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/register-style.css" />
  </head>
  <body>
    <main class="register">
      <header class="name">
        <img class="element" src="img/oops.png" alt="LOOPS 로고" />
        <h1 class="text-wrapper">회원가입</h1>
      </header>
      <form action="#" method="post" aria-label="회원가입 폼">
        <label class="div-wrapper">
          <span class="div">이메일</span>
          <input
            type="email"
            name="email"
            placeholder=" "
            autocomplete="email"
            aria-label="이메일"
          />
        </label>
        <label class="div-wrapper">
          <span class="div">비밀번호</span>
          <input
            type="password"
            name="password"
            placeholder=" "
            autocomplete="new-password"
            aria-label="비밀번호"
          />
        </label>
        <label class="div-wrapper">
          <span class="div">비밀번호 확인</span>
          <input
            type="password"
            name="passwordConfirm"
            placeholder=" "
            autocomplete="new-password"
            aria-label="비밀번호 확인"
          />
        </label>
        <button class="select" type="submit">
          <span class="text-wrapper-2">확인</span>
        </button>
      </form>
    </main>
  </body>
</html>
