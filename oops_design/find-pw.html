<!doctype html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>비밀번호 찾기</title>
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/find-pw-style.css" />
  </head>
  <body>
    <main class="find-pw">
      <header class="name">
        <img class="element" src="img/oops.png" alt="Oops 로고" />
        <h1 class="text-wrapper">비밀번호 찾기</h1>
      </header>
      <p class="div">
        가입된 이메일이 있을 경우 이메일로 비밀번호 변경 메일을 발송해드립니다.
      </p>
      <form action="#" method="post" novalidate>
        <div class="id">
          <span class="placeholder-text">이메일</span>
          <input
            class="text-wrapper-2"
            type="email"
            id="email"
            name="email"
            placeholder=" "
            autocomplete="email"
            inputmode="email"
            aria-label="이메일"
          />
        </div>
        <button class="select" type="submit">
          <span class="text-wrapper-3">확인</span>
        </button>
      </form>
    </main>
  </body>
</html>
