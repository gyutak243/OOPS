<!doctype html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>통학 게시판</title>
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/board-style.css" />
  </head>
  <body>
    <main class="board">
      <div class="frame">
        <header class="div">
          <div class="element-wrapper">
            <img class="element" src="img/oops.png" alt="Loops 로고" />
          </div>
          <nav class="frame-2" aria-label="상단 메뉴">
            <a href="#" class="div-wrapper" aria-current="page">
              <span class="text-wrapper">게시판</span>
            </a>
            <a href="#" class="frame-3">
              <span class="text-wrapper-2">학교 홈페이지</span>
            </a>
            <a href="#" class="view" aria-label="로그인 또는 회원가입">
              <img
                class="image-removebg"
                src="img/men.png"
                alt=""
                aria-hidden="true"
              />
              <span class="text-wrapper-3">로그인 / 회원가입</span>
            </a>
          </nav>
        </header>
        <section class="frame-4" aria-labelledby="board-title">
          <div class="frame-5">
            <h1 class="text-wrapper-4" id="board-title">통학 게시판</h1>
          </div>
          <button
            type="button"
            class="frame-6"
            aria-pressed="false"
            aria-label="통학 게시판 구독"
          >
            <span class="text-wrapper-5">구독</span>
            <img class="star" src="img/star-1.png" alt="" aria-hidden="true" />
          </button>
        </section>
        <section class="frame-7" aria-label="게시글 검색">
          <label class="frame-8" for="board-category">
            <span class="text-wrapper-6">전체 ▼</span>
          </label>
          <div class="frame-9">
            <input
              class="text-wrapper-7"
              id="board-search"
              name="board-search"
              type="search"
              placeholder="검색어를 입력해주세요."
              aria-label="검색어 입력"
            />
          </div>
        </section>
        <section class="frame-10" aria-label="정렬 및 작성">
          <nav class="navbar" aria-label="게시글 정렬">
            <button type="button" class="text-wrapper-8" aria-pressed="true">
              최신순
            </button>
            <button type="button" class="text-wrapper-8" aria-pressed="false">
              오래된순
            </button>
            <button type="button" class="text-wrapper-8" aria-pressed="false">
              조회순
            </button>
            <button type="button" class="text-wrapper-8" aria-pressed="false">
              추천 순
            </button>
          </nav>
          <button type="button" class="frame-11" aria-label="글쓰기">
            <img class="pen" src="img/pen.png" alt="" aria-hidden="true" />
            <span class="text-wrapper-9">글쓰기</span>
          </button>
        </section>
        <section class="frame-12" aria-label="게시글 목록">
          <article class="frame-13">
            <h2 class="element-2">1150번 빨버 시간표 입니다.</h2>
            <div class="frame-14" aria-label="게시글 정보">
              <span class="text-wrapper-10">통학러123</span>
              <time class="text-wrapper-10" datetime="2026-04-28"
                >2026.04.28</time
              >
              <span class="frame-15" aria-label="조회수 728">
                <img class="img" src="img/eye.png" alt="" aria-hidden="true" />
                <span class="text-wrapper-10">728</span>
              </span>
              <span class="frame-15" aria-label="추천수 13">
                <img
                  class="img-2"
                  src="img/good.png"
                  alt=""
                  aria-hidden="true"
                />
                <span class="text-wrapper-10">13</span>
              </span>
            </div>
          </article>
          <article class="frame-13">
            <h2 class="element-2">1150번 빨버 시간표 입니다.</h2>
            <div class="frame-14" aria-label="게시글 정보">
              <span class="text-wrapper-10">통학러123</span>
              <time class="text-wrapper-10" datetime="2026-04-28"
                >2026.04.28</time
              >
              <span class="frame-15" aria-label="조회수 728">
                <img class="img" src="img/eye.png" alt="" aria-hidden="true" />
                <span class="text-wrapper-10">728</span>
              </span>
              <span class="frame-15" aria-label="추천수 13">
                <img
                  class="img-2"
                  src="img/good.png"
                  alt=""
                  aria-hidden="true"
                />
                <span class="text-wrapper-10">13</span>
              </span>
            </div>
          </article>
          <article class="frame-13">
            <h2 class="element-2">1150번 빨버 시간표 입니다.</h2>
            <div class="frame-14" aria-label="게시글 정보">
              <span class="text-wrapper-10">통학러123</span>
              <time class="text-wrapper-10" datetime="2026-04-28"
                >2026.04.28</time
              >
              <span class="frame-15" aria-label="조회수 728">
                <img class="img" src="img/eye.png" alt="" aria-hidden="true" />
                <span class="text-wrapper-10">728</span>
              </span>
              <span class="frame-15" aria-label="추천수 13">
                <img
                  class="img-2"
                  src="img/good.png"
                  alt=""
                  aria-hidden="true"
                />
                <span class="text-wrapper-10">13</span>
              </span>
            </div>
          </article>
          <article class="frame-13">
            <h2 class="element-2">1150번 빨버 시간표 입니다.</h2>
            <div class="frame-14" aria-label="게시글 정보">
              <span class="text-wrapper-10">통학러123</span>
              <time class="text-wrapper-10" datetime="2026-04-28"
                >2026.04.28</time
              >
              <span class="frame-15" aria-label="조회수 728">
                <img class="img" src="img/eye.png" alt="" aria-hidden="true" />
                <span class="text-wrapper-10">728</span>
              </span>
              <span class="frame-15" aria-label="추천수 13">
                <img
                  class="img-2"
                  src="img/good.png"
                  alt=""
                  aria-hidden="true"
                />
                <span class="text-wrapper-10">13</span>
              </span>
            </div>
          </article>
        </section>
        <nav class="frame-16" aria-label="페이지 이동">
          <button type="button" class="view-2">
            <span class="text-wrapper-11">이전</span>
          </button>
          <button type="button" class="view-3" aria-current="page">
            <span class="text-wrapper-12">1</span>
          </button>
          <button type="button" class="view-2">
            <span class="text-wrapper-11">2</span>
          </button>
          <button type="button" class="view-2">
            <span class="text-wrapper-11">3</span>
          </button>
          <button type="button" class="view-2">
            <span class="text-wrapper-11">4</span>
          </button>
          <button type="button" class="view-2">
            <span class="text-wrapper-11">5</span>
          </button>
          <button type="button" class="view-2">
            <span class="text-wrapper-11">다음</span>
          </button>
        </nav>
      </div>
    </main>
  </body>
</html>
